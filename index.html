
<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Độ Nhạy OB52 Mới Nhất Miễn Phí</title>
<style>
body{
    margin:0;
    font-family:-apple-system,BlinkMacSystemFont,Segoe UI,Roboto;
    background:#0a0f14;
    color:#e5e7eb;
    overflow-x:hidden;
}
/* Snow effect */
.snow{
    position:fixed;
    top:-10px;
    color:#00eaff;
    user-select:none;
    pointer-events:none;
    animation:fall linear infinite;
    opacity:.8;
}
@keyframes fall{
    to{transform:translateY(110vh);}
}

.container{
    max-width:420px;
    margin:auto;
    padding:16px;
}
.header{
    text-align:center;
    margin-bottom:20px;
}
.header h1{
    font-size:20px;
    margin:0;
    color:#00eaff;
    text-shadow:0 0 8px rgba(0,234,255,.6);
    animation:flicker 2.5s infinite;
}
@keyframes flicker{
    0%,100%{opacity:1}
    50%{opacity:.7}
    60%{opacity:1}
    70%{opacity:.85}
}
.header p{
    font-size:13px;
    color:#9ca3af;
    margin-top:6px;
}
.search-box{
    display:flex;
    gap:8px;
    margin-bottom:16px;
}
.search-box input{
    flex:1;
    padding:12px;
    border-radius:10px;
    border:none;
    outline:none;
    background:#111827;
    color:#fff;
}
.search-box button{
    padding:12px 16px;
    border:none;
    border-radius:10px;
    background:#00eaff;
    color:#000;
    font-weight:bold;
    box-shadow:0 0 10px rgba(0,234,255,.7);
}
.list{
    display:flex;
    flex-direction:column;
    gap:10px;
}
.item{
    background:#111827;
    padding:12px;
    border-radius:12px;
    border:1px solid rgba(0,234,255,.25);
    cursor:pointer;
    box-shadow:0 0 6px rgba(0,234,255,.25);
}
.item:hover{
    box-shadow:0 0 14px rgba(0,234,255,.6);
}
.detail{
    display:none;
}
.slider{
    margin:12px 0;
}
.slider label{
    font-size:14px;
}
.slider input{
    width:100%;
}
.back{
    margin-bottom:10px;
    color:#00eaff;
    cursor:pointer;
}
.footer-note{
    margin-top:16px;
    font-size:11px;
    color:#6b7280;
    text-align:center;
}
</style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>Độ Nhạy OB52 Mới Nhất Miễn Phí</h1>
        <p>Developer : Hoàng Việt - TikTok : @nhvcuti</p>
    </div>

    <div class="search-box">
        <input id="search" placeholder="Nhập tên thiết bị đang dùng...">
        <button onclick="searchDevice()">Tìm</button>
    </div>

    <div id="list" class="list"></div>

    <div id="detail" class="detail">
        <div class="back" onclick="goBack()">← Quay lại</div>
        <h3 id="deviceName"></h3>

        <div class="slider"><label>Nhìn Xung Quanh: 200</label><input type="range" value="200" max="200"></div>
        <div class="slider"><label>Ống Ngắm Hồng Tâm: 200</label><input type="range" value="200" max="200"></div>
        <div class="slider"><label>Ống Ngắm 2x: 200</label><input type="range" value="200" max="200"></div>
        <div class="slider"><label>Ống Ngắm 4x: 200</label><input type="range" value="200" max="200"></div>
        <div class="slider"><label>Ống Ngắm Súng Ngắm: 200</label><input type="range" value="200" max="200"></div>
        <div class="slider"><label>Nút Camera Tự Do: 200</label><input type="range" value="200" max="200"></div>

        <div class="footer-note">Lưu Ý: Chỉ Mang Tính Chất Tham Khảo Không Chuẩn 100%</div>
    </div>
</div>

<script>
/* Snow generator */
for(let i=0;i<30;i++){
    const s=document.createElement("div");
    s.className="snow";
    s.innerHTML="❄";
    s.style.left=Math.random()*100+"vw";
    s.style.fontSize=8+Math.random()*14+"px";
    s.style.animationDuration=5+Math.random()*5+"s";
    document.body.appendChild(s);
}

const devices = [
    ...Array.from({length:38},(_,i)=>"iPhone "+[6,"6 Plus","6s","6s Plus",7,"7 Plus",8,"8 Plus","X","Xr","Xs","Xs Max",11,"11 Pro","11 Pro Max",12,"12 Mini","12 Pro","12 Pro Max","13 Mini",13,"13 Pro","13 Pro Max",14,"14 Plus","14 Pro","14 Pro Max",15,"15 Plus","15 Pro","15 Pro Max",16,"16 Plus","16 Pro","16 Pro Max",17,"17 Pro","17 Pro Max"][i]),

    "Samsung Yếu (60Hz • Ram/Rom Thấp)",
    "Samsung Tầm Trung (90-120Hz • Ram/Rom Vừa)",
    "Samsung Mạnh (144-240Hz • Ram/Rom Cao)",
    "Oppo Yếu (60Hz • Ram/Rom Thấp)",
    "Oppo Tầm Trung (90-120Hz • Ram/Rom Vừa)",
    "Oppo Mạnh (144-240Hz • Ram/Rom Cao)",
    "Vivo Yếu (60Hz • Ram/Rom Thấp)",
    "Vivo Tầm Trung (90-120Hz • Ram/Rom Vừa)",
    "Vivo Mạnh (144-240Hz • Ram/Rom Cao)",
    "Realme/Redmi/Xiaomi Yếu (60Hz • Ram/Rom Thấp)",
    "Realme/Redmi/Xiaomi Tầm Trung (90-120Hz • Ram/Rom Vừa)",
    "Realme/Redmi/Xiaomi Mạnh (144-240Hz • Ram/Rom Cao)"
];

const sensitivityData = {
    "iPhone 6": [185,175,160,135,110,150],
    "iPhone 6 Plus": [180,170,155,140,115,145],
    "iPhone 6s": [190,180,165,145,115,155],
    "iPhone 6s Plus": [185,175,160,140,110,150],
    "iPhone 7": [195,185,170,150,120,160],
    "iPhone 7 Plus": [190,180,165,145,115,155],
    "iPhone 8": [198,188,172,150,120,165],
    "iPhone 8 Plus": [192,182,168,148,118,160],
    "iPhone X": [198,188,172,150,120,165],
    "iPhone Xr": [194,184,168,148,118,160],
    "iPhone Xs": [200,190,175,152,122,170],
    "iPhone Xs Max": [192,182,166,146,116,158],
    "iPhone 11": [196,186,170,150,120,165],
    "iPhone 11 Pro": [200,190,175,155,125,170],
    "iPhone 11 Pro Max": [192,182,168,148,118,160],
    "iPhone 12": [198,188,172,152,122,168],
    "iPhone 12 Mini": [200,192,178,158,128,175],
    "iPhone 12 Pro": [200,190,175,155,125,170],
    "iPhone 12 Pro Max": [194,184,170,150,120,165],
    "iPhone 13 Mini": [200,192,178,158,130,175],
    "iPhone 13": [198,188,172,152,122,168],
    "iPhone 13 Pro": [200,190,175,155,125,170],
    "iPhone 13 Pro Max": [195,185,170,150,120,165],
    "iPhone 14": [198,188,172,152,122,168],
    "iPhone 14 Plus": [195,185,170,150,120,165],
    "iPhone 14 Pro": [200,190,175,155,125,170],
    "iPhone 14 Pro Max": [196,186,172,152,122,168],
    "iPhone 15": [198,188,172,152,122,168],
    "iPhone 15 Plus": [195,185,170,150,120,165],
    "iPhone 15 Pro": [200,190,175,155,125,170],
    "iPhone 15 Pro Max": [197,187,172,152,122,168],
    "iPhone 16": [198,188,172,152,122,168],
    "iPhone 16 Plus": [195,185,170,150,120,165],
    "iPhone 16 Pro": [200,190,175,155,125,170],
    "iPhone 16 Pro Max": [196,186,172,152,122,168],
    "iPhone 17": [198,188,172,152,122,168],
    "iPhone 17 Pro": [200,190,176,156,126,172],
    "iPhone 17 Pro Max": [196,186,172,152,122,168],

    "Samsung Yếu (60Hz • Ram/Rom Thấp)": [200,178,170,150,100,185],
    "Samsung Tầm Trung (90-120Hz • Ram/Rom Vừa)": [185,168,160,140,95,170],
    "Samsung Mạnh (144-240Hz • Ram/Rom Cao)": [170,155,148,130,90,160],

    "Oppo Yếu (60Hz • Ram/Rom Thấp)": [195,175,165,150,100,185],
    "Oppo Tầm Trung (90-120Hz • Ram/Rom Vừa)": [185,168,158,140,95,175],
    "Oppo Mạnh (144-240Hz • Ram/Rom Cao)": [170,155,148,130,90,165],

    "Vivo Yếu (60Hz • Ram/Rom Thấp)": [195,175,165,150,100,185],
    "Vivo Tầm Trung (90-120Hz • Ram/Rom Vừa)": [185,168,158,140,95,175],
    "Vivo Mạnh (144-240Hz • Ram/Rom Cao)": [170,155,148,130,90,165],

    "Realme/Redmi/Xiaomi Yếu (60Hz • Ram/Rom Thấp)": [188,190,182,180,180,190],
    "Realme/Redmi/Xiaomi Tầm Trung (90-120Hz • Ram/Rom Vừa)": [192,196,190,186,184,195],
    "Realme/Redmi/Xiaomi Mạnh (144-240Hz • Ram/Rom Cao)": [198,200,196,193,190,200],

};
const listEl=document.getElementById("list");
const detailEl=document.getElementById("detail");

function render(list){
    listEl.innerHTML="";
    list.forEach(d=>{
        const div=document.createElement("div");
        div.className="item";
        div.innerText=d;
        div.onclick=()=>openDetail(d);
        listEl.appendChild(div);
    });
}
function searchDevice(){
    const q=document.getElementById("search").value.toLowerCase();
    render(devices.filter(d=>d.toLowerCase().includes(q)));
}

function openDetail(name){
    document.getElementById("deviceName").innerText=name;

    const data = sensitivityData[name] || [180,170,160,150,120,190];

    const sliders = detailEl.querySelectorAll("input[type=range]");
    const labels = detailEl.querySelectorAll("label");
    const titles = [
        "Nhìn Xung Quanh",
        "Ống Ngắm Hồng Tâm",
        "Ống Ngắm 2x",
        "Ống Ngắm 4x",
        "Ống Ngắm Súng Ngắm",
        "Nút Camera Tự Do"
    ];

    sliders.forEach((slider,i)=>{
        slider.value=data[i];
        labels[i].innerText=titles[i]+": "+data[i];
        slider.oninput=()=>{
            labels[i].innerText=titles[i]+": "+slider.value;
        };
    });

    listEl.style.display="none";
    detailEl.style.display="block";
}
function goBack(){
    detailEl.style.display="none";
    listEl.style.display="flex";
}
render(devices);
</script>

</body>
</html>
